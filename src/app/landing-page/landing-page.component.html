<div class="space-background">
  <!-- Moving Starfield Background -->
  <div class="starfield-wrap">
    <div class="starfield-1"></div>
    <div class="starfield-2"></div>
    <div class="starfield-3"></div>
  </div>

  <!-- Intro Animation Overlay -->
  <div class="intro-overlay"></div>
  <img src="assets/logo.png" alt="Stellaris Builder Logo" class="animated-logo" />

  <!-- 3D Scene Wrapper -->
  <div class="scene">
    <div class="planet" [class.is-flipped]="!isLoginMode()">
      <!-- 3D Planet Visuals -->
      <div class="planet-sphere">
        <div class="planet-surface"></div>
      </div>

      <!-- Front Face: Login -->
      <div class="planet-face front">
        <div class="glass-panel form-wrapper">
          <div class="logo-container">
            <h1>Stellaris <span>Builder</span></h1>
            <p class="subtitle">Erschaffe dein Sternenreich</p>
          </div>

          <form (ngSubmit)="onSubmit()" class="auth-form">
            <h2 class="form-title">Willkommen zurück Commander</h2>

            <div *ngIf="errorMessage()" class="error-alert">
              {{ errorMessage() }}
            </div>

            <div *ngIf="successMessage()" class="success-alert">
              {{ successMessage() }}
            </div>

            <div class="input-group">
              <label for="email">E-Mail</label>
              <input
                type="email"
                id="email"
                name="email"
                [ngModel]="email()"
                (ngModelChange)="email.set($event)"
                placeholder="commander@earth.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Passwort</label>
              <input
                type="password"
                id="password"
                name="password"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="submit-btn primary-glow" [disabled]="isLoading()">
              <span *ngIf="!isLoading()">Einloggen</span>
              <span *ngIf="isLoading()" class="loader"></span>
            </button>

            <div class="toggle-mode">
              <p>
                Noch kein Commander?
                <button type="button" class="text-btn" (click)="toggleMode()">
                  Jetzt registrieren
                </button>
              </p>
            </div>
          </form>
        </div>
      </div>

      <!-- Back Face: Register -->
      <div class="planet-face back">
        <div class="glass-panel form-wrapper">
          <div class="logo-container">
            <h1>Stellaris <span>Builder</span></h1>
            <p class="subtitle">Rekrutierungsbüro</p>
          </div>

          <form (ngSubmit)="onSubmit()" class="auth-form">
            <h2 class="form-title">Neuen Account erstellen</h2>

            <div *ngIf="errorMessage()" class="error-alert">
              {{ errorMessage() }}
            </div>

            <div *ngIf="successMessage()" class="success-alert">
              {{ successMessage() }}
            </div>

            <div class="input-group">
              <label for="commander-name">Commander Name</label>
              <input
                type="text"
                id="commander-name"
                name="commanderName"
                [ngModel]="commanderName()"
                (ngModelChange)="commanderName.set($event)"
                placeholder="Dein Name"
                required
              />
            </div>

            <div class="input-group">
              <label for="email-reg">E-Mail</label>
              <input
                type="email"
                id="email-reg"
                name="email"
                [ngModel]="email()"
                (ngModelChange)="email.set($event)"
                placeholder="commander@earth.com"
                required
              />
            </div>

            <div class="input-group">
              <label for="password-reg">Passwort</label>
              <input
                type="password"
                id="password-reg"
                name="password"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="submit-btn primary-glow" [disabled]="isLoading()">
              <span *ngIf="!isLoading()">Registrieren</span>
              <span *ngIf="isLoading()" class="loader"></span>
            </button>

            <div class="toggle-mode">
              <p>
                Bereits im Dienst?
                <button type="button" class="text-btn" (click)="toggleMode()">
                  Hier einloggen
                </button>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

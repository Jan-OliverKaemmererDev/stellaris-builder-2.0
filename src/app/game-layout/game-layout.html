<div class="game-shell">
  <!-- Skip to Content Link (WCAG) -->
  <a class="skip-link" href="#main-content">Zum Hauptinhalt springen</a>

  <!-- Side Menu -->
  <app-side-menu />

  <!-- Header Bar -->
  <header class="game-header" id="game-header">
    <div class="header-left"></div>

    <div class="header-right">
      <!-- User Menu -->
      <div class="user-menu">
        <button
          class="user-avatar"
          (click)="toggleDropdown()"
          id="user-avatar-btn"
          [attr.aria-expanded]="dropdownOpen() ? 'true' : 'false'"
          aria-haspopup="true"
          aria-label="Benutzermenü öffnen"
        >
          {{ userInitials }}
        </button>

        @if (dropdownOpen()) {
          <div class="user-dropdown" id="user-dropdown" role="menu" aria-label="Benutzermenü">
            <div class="dropdown-header">
              <span class="dropdown-name">{{ commanderName }}</span>
            </div>
            <div class="dropdown-divider" role="separator"></div>
            <a
              routerLink="/privacy-policy"
              class="dropdown-item"
              id="dropdown-privacy"
              role="menuitem"
            >
              <span class="dropdown-icon" aria-hidden="true">🔒</span>
              Privacy Policy
            </a>
            <a routerLink="/legal-notice" class="dropdown-item" id="dropdown-legal" role="menuitem">
              <span class="dropdown-icon" aria-hidden="true">📋</span>
              Legal Notice
            </a>
            <div class="dropdown-divider" role="separator"></div>
            <button
              class="dropdown-item logout"
              (click)="logout()"
              id="dropdown-logout"
              role="menuitem"
            >
              <span class="dropdown-icon" aria-hidden="true">🚪</span>
              Logout
            </button>
          </div>
        }
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="game-content" id="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="game-footer" id="game-footer">
    <a routerLink="/privacy-policy">Privacy Policy</a>
    <span class="footer-separator" aria-hidden="true">•</span>
    <a routerLink="/legal-notice">Legal Notice</a>
  </footer>

  <app-offline-progress-dialog></app-offline-progress-dialog>
</div>
